name: "🔄 Weekly Player Rotation"

on:
  workflow_run:
    workflows: ["📊 Record Weekly Results"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

# Runs automatically right after "Record Weekly Results" finishes successfully
# (which itself is scheduled for Monday 11:00 UTC). Chaining off workflow_run
# instead of a separate cron avoids GitHub silently dropping one of two
# independent scheduled triggers.

permissions:
  contents: write

jobs:
  draw:
    runs-on: ubuntu-latest
    # Skip if the upstream "Record Weekly Results" run failed.
    # (Always run for manual workflow_dispatch.)
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run weekly draw
        run: node scripts/weekly-draw.js

      - name: Commit updated assignments
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/current-week.json
          if git diff --cached --quiet; then
            echo "No changes to commit (season may be complete)."
          else
            WEEK=$(node -e "const w=require('./data/current-week.json'); process.stdout.write(String(w.number));")
            DATE=$(date -u '+%Y-%m-%d')
            git commit -m "🔄 Week ${WEEK} player rotation — ${DATE}"
            git push
          fi
